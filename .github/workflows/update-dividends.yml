name: Update Dividends

on:
  schedule:
    - cron: '0 9 1,15 * *'   # 1-е и 15-е числа месяца в 09:00 UTC
  workflow_dispatch:           # Ручной запуск через кнопку на GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # Нужно для git push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scripts/scrape.py

      - name: Commit updated data (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit"
          else
            git commit -m "chore: update dividends $(date -u +%Y-%m-%d)"
            git push
          fi
